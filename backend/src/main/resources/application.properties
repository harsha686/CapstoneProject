# Application Configuration
spring.application.name=SecureVote
server.port=9090

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/securevote
spring.datasource.username=root
spring.datasource.password=mellof41.h

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.main.allow-bean-definition-overriding=true

# application.properties
spring.main.allow-bean-definition-overriding=true



# JWT Configuration
jwt.secret=your-secret-key-should-be-at-least-256-bits-for-hs256-algorithm-and-keep-it-secure
jwt.expiration=86400000

# Face Recognition Service
face.recognition.service.url=http://localhost:5000

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Logging
logging.level.com.securevote=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Security
spring.security.user.name=admin
spring.security.user.password=admin123

